# spellchecker:ignore taiki dtolnay Taplo xvzf musleabihf gnueabihf msvc clippy bindgen

name: CI Pipeline

on:
  push:
    branches:
      - main
      - ci
  pull_request:
  workflow_dispatch:

env:
  NEXIGON_REPOSITORY: ${{ vars.NEXIGON_REPOSITORY }}
  NEXIGON_PACKAGE: ${{ vars.NEXIGON_PACKAGE }}

jobs:
  prepare-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create Release
        run: |
          cat <<EOF >.nexigon-cli.toml
            hub-url = "${{ secrets.NEXIGON_HUB_URL }}"
            token = "${{ secrets.NEXIGON_USER_TOKEN }}"
          EOF
          curl -sfSL https://install.nexigon.dev/download-cli.sh | sh
          export NEXIGON_CLI="./nexigon-cli"
          ./scripts/prepare-release.sh
      - name: Upload .release-env
        uses: actions/upload-artifact@v4
        with:
          name: release-env
          path: .release-env

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        system:
          - customized-efi-amd64
          - customized-efi-arm64
          - customized-pi5
          - customized-pi4
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download .release-env
        uses: actions/download-artifact@v4
        with:
          name: release-env
      - name: Setup Qemu
        run: |
          docker run --privileged --rm tonistiigi/binfmt --install all
      - name: Build
        run: |
          cat <<EOF >.env
            NEXIGON_HUB_URL="${{ secrets.NEXIGON_HUB_URL }}"
            NEXIGON_TOKEN="${{ secrets.NEXIGON_DEPLOYMENT_TOKEN }}"
            NEXIGON_REPOSITORY="${{ env.NEXIGON_REPOSITORY }}"
            NEXIGON_PACKAGE="${{ env.NEXIGON_PACKAGE }}"
          EOF
          ./scripts/build-release.sh "${{ matrix.system }}"
      - name: Upload
        run: |
          cat <<EOF >.nexigon-cli.toml
            hub-url = "${{ secrets.NEXIGON_HUB_URL }}"
            token = "${{ secrets.NEXIGON_USER_TOKEN }}"
          EOF
          curl -sfSL https://install.nexigon.dev/download-cli.sh | sh
          export NEXIGON_CLI="./nexigon-cli"
          sudo chown -R "$(id -u):$(id -g)" build
          ./scripts/upload-release.sh
