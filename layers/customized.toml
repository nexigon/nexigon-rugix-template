#:schema https://raw.githubusercontent.com/silitics/rugix/refs/tags/v0.8.0/schemas/rugix-bakery-layer.schema.json

parent = "core/debian-bookworm"

recipes = [
    # Set a static hostname.
    "core/set-hostname",
    # Persist `/root`.
    "core/persist-root-home",
    # Setup and enable SSH.
    "core/ssh",
    # Setup the network.
    "rugix-extra/debian-setup-network",
    # Setup the time synchronization.
    "rugix-extra/debian-setup-timesyncd",
    # Enable discovery of the system in the local network.
    "rugix-extra/avahi",
    # Setup Nexigon Agent.
    "nexigon/nexigon-agent",
    # Configure Nexigon Agent.
    "nexigon/nexigon-agent-config",
    # Power management commands.
    "nexigon/nexigon-power",
    # Systemd service management commands.
    "nexigon/nexigon-systemd",
    # Rugix Apps lifecycle commands.
    "nexigon/nexigon-rugix-apps",
    # Rugix OTA update service.
    "nexigon/nexigon-rugix-ota",
    # Rugix watchdog (auto-rollback).
    "nexigon/nexigon-rugix-watchdog",
    # Install a static web site.
    "hello-world",
    # Install Node-RED.
    "node-red",
]

[parameters."core/set-hostname"]
hostname = "nexigon-rugix-template"

[parameters."nexigon/nexigon-agent"]
version = "v0.5"

[parameters."nexigon/nexigon-agent-config"]
# Enable the remote terminal and declare web UI export.
extra_config = """
[commands]
enabled = true

[terminal]
enabled = true
user = "root"

[[exports]]
name = "Web UI"
protocol = "http"
port = 80
[[exports]]
name = "Node-RED"
protocol = "http"
port = 1880
"""
